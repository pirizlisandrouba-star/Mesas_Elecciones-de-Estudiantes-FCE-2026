<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Mesas">
    <meta name="format-detection" content="telephone=no">
    <meta property="og:title" content="¿Dónde Voto? - Consulta de Mesas">
    <meta property="og:description" content="Ingresá tu registro y consultá tu mesa de votación">
    <meta property="og:type" content="website">
    <title>¿Dónde Voto? - Consulta de Mesas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #e65100 0%, #ff9800 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 15px;
        }

        .header h1 {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
            margin-top: 5px;
            font-weight: 500;
        }

        .header .fecha {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .sede-badge {
            text-align: center;
            margin-bottom: 20px;
        }

        .sede-badge span {
            display: inline-block;
            background: #bf360c;
            color: #fff;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #e65100;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.3rem;
            font-family: 'Roboto', Arial, sans-serif;
            font-weight: 700;
            border: 3px solid #ffe0b2;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            color: #bf360c;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-group input:focus {
            border-color: #e65100;
            box-shadow: 0 0 0 4px rgba(230,81,0,0.15);
        }

        .input-group input::placeholder {
            color: #bcaaa4;
            font-weight: 400;
            letter-spacing: 0;
            font-size: 1rem;
        }

        .btn-search {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Roboto', Arial, sans-serif;
            color: #ffffff;
            background: linear-gradient(135deg, #e65100, #ff9800);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(230,81,0,0.3);
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(230,81,0,0.4);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        /* RESULTADO */
        .result-container {
            margin-top: 25px;
            display: none;
        }

        .result-container.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #ffe0b2;
        }

        .result-header {
            padding: 15px 20px;
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-header.success {
            background: #e65100;
            color: #ffffff;
        }

        .result-header.error {
            background: #c62828;
            color: #ffffff;
        }

        .result-row {
            display: flex;
            border-bottom: 1px solid #ffe0b2;
        }

        .result-label {
            flex: 1;
            padding: 18px 15px;
            font-weight: 700;
            font-size: 0.8rem;
            color: #bf360c;
            background: #fff3e0;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .result-value {
            flex: 1.5;
            padding: 18px 15px;
            font-weight: 900;
            font-size: 1.2rem;
            color: #e65100;
            background: #fff8e1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .result-value.mesa-num {
            font-size: 2.8rem;
            color: #bf360c;
            padding: 25px 15px;
        }

        .result-value.ubicacion {
            font-size: 1rem;
            line-height: 1.4;
        }

        .error-message {
            padding: 25px 20px;
            text-align: center;
            background: #ffebee;
            color: #c62828;
            font-weight: 500;
            font-size: 1rem;
        }

        .error-message .emoji {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        /* TABLE VIEW */
        .btn-toggle-table {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Roboto', Arial, sans-serif;
            color: #e65100;
            background: transparent;
            border: 2px solid #ffe0b2;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-toggle-table:hover {
            background: #fff3e0;
            border-color: #e65100;
        }

        .table-container {
            margin-top: 15px;
            display: none;
            max-height: 350px;
            overflow-y: auto;
            border-radius: 12px;
            border: 2px solid #ffe0b2;
        }

        .table-container.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }

        .data-table thead th {
            background: #e65100;
            color: #fff;
            padding: 10px 5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .data-table tbody tr {
            transition: background 0.2s;
        }

        .data-table tbody tr:nth-child(even) {
            background: #fff3e0;
        }

        .data-table tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        .data-table tbody tr.highlight {
            background: #ffe082 !important;
            font-weight: 700;
        }

        .data-table td {
            padding: 8px 5px;
            text-align: center;
            color: #bf360c;
            border-bottom: 1px solid #ffe0b2;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
        }

        .footer .org {
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🗳️ ¿Dónde Voto?</h1>
        <p class="subtitle">Elecciones Obligatorias de Consejo Estudiantil<br>y Centro de Estudiantes</p>
        <span class="fecha">📅 Del 20 al 24 de Abril</span>
    </div>

    <div class="card">
        <div class="sede-badge">
            <span>📍 Sede Córdoba</span>
        </div>

        <div class="input-group">
            <label>Nº de Registro del Alumno</label>
            <input 
                type="number" 
                id="registroInput" 
                placeholder="Ej: 903000" 
                inputmode="numeric"
                autocomplete="off"
            >
        </div>

        <button class="btn-search" id="btnSearch" onclick="buscarMesa()">
            🔍 Buscar Mesa
        </button>

        <div class="result-container" id="resultContainer"></div>

        <button class="btn-toggle-table" onclick="toggleTable()">
            📄 Ver / Ocultar listado completo
        </button>

        <div class="table-container" id="tableContainer">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Mesa</th>
                        <th>Desde</th>
                        <th>Hasta</th>
                        <th>Ubicación</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <p>Exigí tu certificado de votación</p>
        <p class="org">Nuevo Espacio CECE</p>
    </div>

    <script>
        // ===== BASE DE DATOS CON RANGOS (desde la imagen) =====
        const mesas = [
            { mesa: 1,  desde: 45036,  hasta: 836369, ubicacion: "Aula 17 - Ed. Histórico" },
            { mesa: 2,  desde: 836373, hasta: 864550, ubicacion: "Aula 17 - Ed. Histórico" },
            { mesa: 3,  desde: 864557, hasta: 878133, ubicacion: "Aula 17 - Ed. Histórico" },
            { mesa: 4,  desde: 878137, hasta: 884824, ubicacion: "Aula 17 - Ed. Histórico" },
            { mesa: 5,  desde: 884826, hasta: 889084, ubicacion: "Aula 19 - Ed. Histórico" },
            { mesa: 6,  desde: 889085, hasta: 892512, ubicacion: "Aula 19 - Ed. Histórico" },
            { mesa: 7,  desde: 892513, hasta: 894999, ubicacion: "Aula 19 - Ed. Histórico" },
            { mesa: 8,  desde: 895001, hasta: 897304, ubicacion: "Aula 36 - Ed. Histórico" },
            { mesa: 9,  desde: 897305, hasta: 899305, ubicacion: "Aula 36 - Ed. Histórico" },
            { mesa: 10, desde: 899307, hasta: 901039, ubicacion: "Aula 36 - Ed. Histórico" },
            { mesa: 11, desde: 901040, hasta: 902450, ubicacion: "Aula 37 - Ed. Histórico" },
            { mesa: 12, desde: 902451, hasta: 903951, ubicacion: "Aula 37 - Ed. Histórico" },
            { mesa: 13, desde: 903952, hasta: 905474, ubicacion: "Aula 37 - Ed. Histórico" },
            { mesa: 14, desde: 905475, hasta: 906772, ubicacion: "Aula 38 - Ed. Histórico" },
            { mesa: 15, desde: 906773, hasta: 908008, ubicacion: "Aula 38 - Ed. Histórico" },
            { mesa: 16, desde: 908009, hasta: 908988, ubicacion: "Aula 38 - Ed. Histórico" },
            { mesa: 17, desde: 908989, hasta: 909910, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 18, desde: 909911, hasta: 910841, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 19, desde: 910842, hasta: 911575, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 20, desde: 911576, hasta: 912463, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 21, desde: 912464, hasta: 913365, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 22, desde: 913366, hasta: 914175, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 23, desde: 914176, hasta: 914995, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 24, desde: 914996, hasta: 915927, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 25, desde: 915928, hasta: 916833, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 26, desde: 916834, hasta: 917692, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 27, desde: 917699, hasta: 918996, ubicacion: "Salón de Actos - Ed. Anexo" },
            { mesa: 28, desde: 918997, hasta: 921342, ubicacion: "Salón de Actos - Ed. Anexo" }
        ];

        // ===== BÚSQUEDA POR RANGO =====
        function buscarMesa() {
            const input = document.getElementById('registroInput');
            const container = document.getElementById('resultContainer');
            const nro = parseInt(input.value.trim());

            if (!nro || isNaN(nro)) {
                mostrarError(container, "Por favor, ingresá un número de registro válido.");
                return;
            }

            // Buscar en qué rango cae el número
            const resultado = mesas.find(m => nro >= m.desde && nro <= m.hasta);

            if (resultado) {
                container.className = 'result-container active';
                container.innerHTML = `
                    <div class="result-box">
                        <div class="result-header success">✅ ¡Te encontramos!</div>
                        <div class="result-row">
                            <div class="result-label">📝 Tu Registro</div>
                            <div class="result-value">${nro}</div>
                        </div>
                        <div class="result-row">
                            <div class="result-label">🪑 Tu Mesa</div>
                            <div class="result-value mesa-num">${resultado.mesa}</div>
                        </div>
                        <div class="result-row" style="border-bottom:none;">
                            <div class="result-label">📍 Ubicación</div>
                            <div class="result-value ubicacion">${resultado.ubicacion}</div>
                        </div>
                    </div>
                `;
                highlightRow(resultado.mesa);
            } else {
                mostrarError(container, 
                    `El registro <strong>${nro}</strong> no se encontró en el padrón.<br>
                    Verificá tu número e intentá nuevamente.<br><br>
                    <small>Rango válido: 45.036 a 921.342</small>`
                );
            }
        }

        function mostrarError(container, mensaje) {
            container.className = 'result-container active';
            container.innerHTML = `
                <div class="result-box">
                    <div class="result-header error">No encontrado</div>
                    <div class="error-message">
                        <span class="emoji">😕</span>
                        ${mensaje}
                    </div>
                </div>
            `;
        }

        // ===== ENTER para buscar =====
        document.getElementById('registroInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') buscarMesa();
        });

        // ===== TABLA COMPLETA =====
        function cargarTabla() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = mesas.map(m => `
                <tr data-mesa="${m.mesa}">
                    <td><strong>${m.mesa}</strong></td>
                    <td>${m.desde.toLocaleString()}</td>
                    <td>${m.hasta.toLocaleString()}</td>
                    <td>${m.ubicacion}</td>
                </tr>
            `).join('');
        }

        function toggleTable() {
            document.getElementById('tableContainer').classList.toggle('active');
        }

        function highlightRow(mesa) {
            document.querySelectorAll('.data-table tbody tr').forEach(tr => {
                tr.classList.remove('highlight');
                if (parseInt(tr.dataset.mesa) === mesa) {
                    tr.classList.add('highlight');
                    tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }

        cargarTabla();
    </script>
</body>
</html>
