<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Mesas</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Roboto', Arial, sans-serif;
    background:linear-gradient(135deg,#e65100,#ff9800);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

.header {
    text-align:center;
    margin:20px 0;
}

.header h1 {
    color:#fff;
    font-size:1.6rem;
    font-weight:900;
}

.card {
    background:#fff;
    border-radius:20px;
    padding:25px;
    width:100%;
    max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

label {
    font-size:0.8rem;
    font-weight:700;
    color:#e65100;
}

input {
    width:100%;
    padding:15px;
    margin-top:8px;
    font-size:1.2rem;
    text-align:center;
    border-radius:10px;
    border:2px solid #ffe0b2;
}

button {
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    font-weight:700;
    background:#e65100;
    color:white;
    font-size:1rem;
}

.result {
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.success { background:#fff3e0; color:#bf360c; }
.error { background:#ffebee; color:#c62828; }

.big {
    font-size:2rem;
    font-weight:900;
}

/* TABLA */
.table-container {
    margin-top:20px;
    max-height:300px;
    overflow-y:auto;
    border-radius:10px;
    border:2px solid #ffe0b2;
}

table {
    width:100%;
    border-collapse:collapse;
    font-size:0.8rem;
}

th {
    background:#e65100;
    color:#fff;
    padding:10px;
}

td {
    padding:8px;
    text-align:center;
    border-bottom:1px solid #ffe0b2;
}

tr.highlight {
    background:#ffe082;
    font-weight:700;
}
</style>
</head>

<body>

<div class="header">
    <h1>📋 Consulta de Mesas</h1>
</div>

<div class="card">

<label>Ingresá tu número de registro</label>
<input id="input" type="number" placeholder="Ej: 903443">

<button onclick="buscar()">🔍 Buscar Mesa</button>

<div id="resultado"></div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Desde</th>
<th>Hasta</th>
<th>Mesa</th>
<th>Ubicación</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script>

// 🔥 DATOS CORRECTOS
const datos = [
{desde:45036,hasta:836369,mesa:1,ubicacion:"Aula 17 - Ed. Histórico"},
{desde:836373,hasta:864550,mesa:2,ubicacion:"Aula 17 - Ed. Histórico"},
{desde:864557,hasta:878133,mesa:3,ubicacion:"Aula 17 - Ed. Histórico"},
{desde:878137,hasta:884824,mesa:4,ubicacion:"Aula 17 - Ed. Histórico"},
{desde:884826,hasta:889084,mesa:5,ubicacion:"Aula 19 - Ed. Histórico"},
{desde:889085,hasta:892512,mesa:6,ubicacion:"Aula 19 - Ed. Histórico"},
{desde:892513,hasta:894999,mesa:7,ubicacion:"Aula 19 - Ed. Histórico"},
{desde:895001,hasta:897304,mesa:8,ubicacion:"Aula 36 - Ed. Histórico"},
{desde:897305,hasta:899305,mesa:9,ubicacion:"Aula 36 - Ed. Histórico"},
{desde:899307,hasta:901039,mesa:10,ubicacion:"Aula 36 - Ed. Histórico"},
{desde:901040,hasta:902450,mesa:11,ubicacion:"Aula 37 - Ed. Histórico"},
{desde:902451,hasta:903951,mesa:12,ubicacion:"Aula 37 - Ed. Histórico"},
{desde:903952,hasta:905474,mesa:13,ubicacion:"Aula 37 - Ed. Histórico"},
{desde:905475,hasta:906772,mesa:14,ubicacion:"Aula 38 - Ed. Histórico"},
{desde:906773,hasta:908008,mesa:15,ubicacion:"Aula 38 - Ed. Histórico"},
{desde:908009,hasta:908988,mesa:16,ubicacion:"Aula 38 - Ed. Histórico"},
{desde:908989,hasta:909910,mesa:17,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:909911,hasta:910841,mesa:18,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:910842,hasta:911575,mesa:19,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:911576,hasta:912463,mesa:20,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:912464,hasta:913365,mesa:21,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:913366,hasta:914175,mesa:22,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:914176,hasta:914995,mesa:23,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:914996,hasta:915927,mesa:24,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:915928,hasta:916833,mesa:25,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:916834,hasta:917692,mesa:26,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:917699,hasta:918996,mesa:27,ubicacion:"Salón de Actos - Ed. Anexo"},
{desde:918997,hasta:921342,mesa:28,ubicacion:"Salón de Actos - Ed. Anexo"}
];

// 🔍 BUSCAR
function buscar() {
    const valor = parseInt(document.getElementById("input").value);
    const div = document.getElementById("resultado");

    if (!valor) {
        div.innerHTML = `<div class="result error">⚠️ Ingresá un número válido</div>`;
        return;
    }

    const res = datos.find(d => valor >= d.desde && valor <= d.hasta);

    if (res) {
        div.innerHTML = `
        <div class="result success">
            <div>📝 Registro: ${valor}</div>
            <div class="big">🪑 Mesa ${res.mesa}</div>
            <div>📍 ${res.ubicacion}</div>
        </div>`;
        highlight(res.desde);
    } else {
        div.innerHTML = `<div class="result error">😕 No encontrado</div>`;
    }
}

// ENTER
document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") buscar();
});

// 📊 TABLA
function cargarTabla() {
    const t = document.getElementById("tabla");
    t.innerHTML = datos.map(d => `
        <tr data-desde="${d.desde}">
            <td>${d.desde}</td>
            <td>${d.hasta}</td>
            <td>${d.mesa}</td>
            <td>${d.ubicacion}</td>
        </tr>
    `).join('');
}

// 🎯 HIGHLIGHT
function highlight(desde) {
    document.querySelectorAll("tr").forEach(tr => {
        tr.classList.remove("highlight");
        if (parseInt(tr.dataset.desde) === desde) {
            tr.classList.add("highlight");
            tr.scrollIntoView({behavior:"smooth",block:"center"});
        }
    });
}

cargarTabla();

</script>

</body>
</html>
