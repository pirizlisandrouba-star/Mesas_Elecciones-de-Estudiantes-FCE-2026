<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consulta de Mesas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #e65100 0%, #ff9800 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .header h1 {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #e65100;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.3rem;
            font-family: 'Roboto', Arial, sans-serif;
            font-weight: 700;
            border: 3px solid #ffe0b2;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            color: #bf360c;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-group input:focus {
            border-color: #e65100;
            box-shadow: 0 0 0 4px rgba(230,81,0,0.15);
        }

        .input-group input::placeholder {
            color: #bcaaa4;
            font-weight: 400;
            letter-spacing: 0;
            font-size: 1rem;
        }

        .btn-search {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Roboto', Arial, sans-serif;
            color: #ffffff;
            background: linear-gradient(135deg, #e65100, #ff9800);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(230,81,0,0.3);
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(230,81,0,0.4);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        /* RESULTADO */
        .result-container {
            margin-top: 25px;
            display: none;
        }

        .result-container.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            border-radius: 16px;
            overflow: hidden;
        }

        .result-header {
            padding: 15px 20px;
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-header.success {
            background: #e65100;
            color: #ffffff;
        }

        .result-header.error {
            background: #c62828;
            color: #ffffff;
        }

        .result-row {
            display: flex;
            border-bottom: 1px solid #ffe0b2;
        }

        .result-label {
            flex: 1;
            padding: 18px 20px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #bf360c;
            background: #fff3e0;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .result-value {
            flex: 1.5;
            padding: 18px 20px;
            font-weight: 900;
            font-size: 1.3rem;
            color: #e65100;
            background: #fff8e1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-value.mesa-num {
            font-size: 2.5rem;
            color: #bf360c;
            padding: 25px 20px;
        }

        .error-message {
            padding: 25px 20px;
            text-align: center;
            background: #ffebee;
            color: #c62828;
            font-weight: 500;
            font-size: 1rem;
        }

        .error-message .emoji {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        /* TABLE VIEW */
        .btn-toggle-table {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Roboto', Arial, sans-serif;
            color: #e65100;
            background: transparent;
            border: 2px solid #ffe0b2;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-toggle-table:hover {
            background: #fff3e0;
            border-color: #e65100;
        }

        .table-container {
            margin-top: 15px;
            display: none;
            max-height: 350px;
            overflow-y: auto;
            border-radius: 12px;
            border: 2px solid #ffe0b2;
        }

        .table-container.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .data-table thead th {
            background: #e65100;
            color: #fff;
            padding: 12px 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .data-table tbody tr {
            transition: background 0.2s;
        }

        .data-table tbody tr:nth-child(even) {
            background: #fff3e0;
        }

        .data-table tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        .data-table tbody tr.highlight {
            background: #ffe082 !important;
            font-weight: 700;
        }

        .data-table td {
            padding: 10px 8px;
            text-align: center;
            color: #bf360c;
            border-bottom: 1px solid #ffe0b2;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📋 Consulta de Mesas</h1>
        <p>Ingresá tu número de registro</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Nº de Registro del Alumno</label>
            <input 
                type="number" 
                id="registroInput" 
                placeholder="Ej: 903443" 
                inputmode="numeric"
                autocomplete="off"
            >
        </div>

        <button class="btn-search" id="btnSearch" onclick="buscarMesa()">
            🔍 Buscar Mesa
        </button>

        <div class="result-container" id="resultContainer">
            <!-- Resultado dinámico -->
        </div>

        <button class="btn-toggle-table" onclick="toggleTable()">
            📄 Ver / Ocultar listado completo
        </button>

        <div class="table-container" id="tableContainer">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Registro</th>
                        <th>Mesa</th>
                        <th>Ubicación</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Se llena dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <p>Datos cargados desde planilla oficial</p>
    </div>

    <script>
        // ===== BASE DE DATOS desde el Excel =====
        const datos = [
            { registro: 45035,  mesa: 1,  ubicacion: "Aula 17" },
            { registro: 836369, mesa: 2,  ubicacion: "Aula 17" },
            { registro: 864550, mesa: 3,  ubicacion: "Aula 17" },
            { registro: 878133, mesa: 4,  ubicacion: "Aula 17" },
            { registro: 884824, mesa: 5,  ubicacion: "Aula 19" },
            { registro: 889084, mesa: 6,  ubicacion: "Aula 19" },
            { registro: 892512, mesa: 7,  ubicacion: "Aula 19" },
            { registro: 894999, mesa: 8,  ubicacion: "Aula 36" },
            { registro: 897304, mesa: 9,  ubicacion: "Aula 36" },
            { registro: 899305, mesa: 10, ubicacion: "Aula 36" },
            { registro: 901039, mesa: 11, ubicacion: "Aula 37" },
            { registro: 902450, mesa: 12, ubicacion: "Aula 37" },
            { registro: 903443, mesa: 12, ubicacion: "Aula 37" },
            { registro: 903951, mesa: 13, ubicacion: "Aula 37" },
            { registro: 905474, mesa: 14, ubicacion: "Aula 38" },
            { registro: 906772, mesa: 15, ubicacion: "Aula 38" },
            { registro: 908008, mesa: 16, ubicacion: "Aula 38" },
            { registro: 908988, mesa: 17, ubicacion: "Salón de Actos" },
            { registro: 909910, mesa: 18, ubicacion: "Salón de Actos" },
            { registro: 910841, mesa: 19, ubicacion: "Salón de Actos" },
            { registro: 911575, mesa: 20, ubicacion: "Salón de Actos" },
            { registro: 912463, mesa: 21, ubicacion: "Salón de Actos" },
            { registro: 913365, mesa: 22, ubicacion: "Salón de Actos" },
            { registro: 914175, mesa: 23, ubicacion: "Salón de Actos" },
            { registro: 914995, mesa: 24, ubicacion: "Salón de Actos" },
            { registro: 915927, mesa: 25, ubicacion: "Salón de Actos" },
            { registro: 916833, mesa: 26, ubicacion: "Salón de Actos" },
            { registro: 917692, mesa: 27, ubicacion: "Salón de Actos" },
            { registro: 918996, mesa: 28, ubicacion: "Salón de Actos" },
            { registro: 921342, mesa: 28, ubicacion: "Salón de Actos" }
        ];

        // ===== FUNCIÓN: Buscar por registro =====
        function buscarMesa() {
            const input = document.getElementById('registroInput');
            const container = document.getElementById('resultContainer');
            const nroRegistro = parseInt(input.value.trim());

            if (!nroRegistro || isNaN(nroRegistro)) {
                container.className = 'result-container active';
                container.innerHTML = `
                    <div class="result-box">
                        <div class="result-header error">Error</div>
                        <div class="error-message">
                            <span class="emoji">⚠️</span>
                            Por favor, ingresá un número de registro válido.
                        </div>
                    </div>
                `;
                return;
            }

            const sorted = [...datos].sort((a, b) => a.registro - b.registro);
            let resultado = null;

            // Busqueda exacta primero
            resultado = datos.find(d => d.registro === nroRegistro);

            // Si no hay coincidencia exacta, buscar por rango
            if (!resultado) {
                for (let i = sorted.length - 1; i >= 0; i--) {
                    if (nroRegistro >= sorted[i].registro) {
                        resultado = sorted[i];
                        break;
                    }
                }
            }

            if (resultado) {
                container.className = 'result-container active';
                container.innerHTML = `
                    <div class="result-box">
                        <div class="result-header success">✅ Registro encontrado</div>
                        <div class="result-row">
                            <div class="result-label">📝 Registro</div>
                            <div class="result-value">${nroRegistro}</div>
                        </div>
                        <div class="result-row">
                            <div class="result-label">🪑 Mesa</div>
                            <div class="result-value mesa-num">${resultado.mesa}</div>
                        </div>
                        <div class="result-row" style="border-bottom:none;">
                            <div class="result-label">📍 Ubicación</div>
                            <div class="result-value">${resultado.ubicacion}</div>
                        </div>
                    </div>
                `;
                highlightRow(resultado.registro);
            } else {
                container.className = 'result-container active';
                container.innerHTML = `
                    <div class="result-box">
                        <div class="result-header error">No encontrado</div>
                        <div class="error-message">
                            <span class="emoji">😕</span>
                            El registro <strong>${nroRegistro}</strong> no se encontró en el listado.<br>
                            Verificá el número e intentá nuevamente.
                        </div>
                    </div>
                `;
            }
        }

        // ===== Buscar con ENTER =====
        document.getElementById('registroInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                buscarMesa();
            }
        });

        // ===== TABLA COMPLETA =====
        function cargarTabla() {
            const tbody = document.getElementById('tableBody');
            const sorted = [...datos].sort((a, b) => a.registro - b.registro);
            tbody.innerHTML = sorted.map(d => `
                <tr data-registro="${d.registro}">
                    <td>${d.registro}</td>
                    <td>${d.mesa}</td>
                    <td>${d.ubicacion}</td>
                </tr>
            `).join('');
        }

        function toggleTable() {
            const tc = document.getElementById('tableContainer');
            tc.classList.toggle('active');
        }

        function highlightRow(registro) {
            document.querySelectorAll('.data-table tbody tr').forEach(tr => {
                tr.classList.remove('highlight');
                if (parseInt(tr.dataset.registro) === registro) {
                    tr.classList.add('highlight');
                    tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }

        // Inicializar tabla al cargar
        cargarTabla();
    </script>
</body>
</html>
